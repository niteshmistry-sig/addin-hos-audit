<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HOS Log Edit Audit</title>
  <link rel="stylesheet" href="styles/main.css?v=1" />
</head>
<body>

<div id="hla-root">

  <!-- Toolbar -->
  <div class="hla-toolbar">
    <div class="hla-control-group">
      <label class="hla-label" for="hla-driver-select">Driver</label>
      <select id="hla-driver-select" class="hla-select">
        <option value="">-- Select Driver --</option>
      </select>
    </div>
    <div class="hla-control-group">
      <label class="hla-label" for="hla-from-date">From</label>
      <input type="date" id="hla-from-date" class="hla-input">
    </div>
    <div class="hla-control-group">
      <label class="hla-label" for="hla-to-date">To</label>
      <input type="date" id="hla-to-date" class="hla-input">
    </div>
    <button id="hla-search-btn" class="hla-btn hla-btn-primary" disabled>Search</button>
    <span id="hla-date-error" class="hla-date-error" style="display:none;"></span>
  </div>

  <!-- Results Header -->
  <div id="hla-results-header" class="hla-results-header" style="display:none;">
    <span id="hla-result-count" class="hla-result-count">0 edits found</span>
    <div class="hla-filter-group" id="hla-modifier-filter" style="display:none;">
      <label class="hla-label">Modified By</label>
      <div class="hla-dropdown" id="hla-modifier-dropdown">
        <button class="hla-btn hla-btn-small hla-dropdown-toggle" id="hla-modifier-toggle">All <span class="hla-caret">&#x25BC;</span></button>
        <div class="hla-dropdown-menu" id="hla-modifier-menu"></div>
      </div>
    </div>
    <button id="hla-csv-btn" class="hla-btn hla-btn-small">&#x2B07; Export CSV</button>
  </div>

  <!-- Content Area -->
  <div id="hla-content">

    <!-- Results Table -->
    <div class="hla-table-wrap">
      <table class="hla-table" id="hla-audit-table">
        <thead>
          <tr>
            <th class="hla-sortable" data-sort="punchDateTime">Punch Date/Time <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="driverName">Driver <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="editDateTime">Edit Date/Time <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="editedByName">Edited By <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="originalStatus">Original Status <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="newStatus">New Status <span class="hla-sort-arrow"></span></th>
            <th class="hla-sortable" data-sort="recordState">Record State <span class="hla-sort-arrow"></span></th>
            <th>Annotations</th>
            <th class="hla-sortable" data-sort="origin">Origin <span class="hla-sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="hla-table-body"></tbody>
      </table>
    </div>

    <!-- Loading Overlay -->
    <div id="hla-loading" style="display:none;">
      <div class="hla-spinner-wrap">
        <div class="hla-spinner"></div>
        <p id="hla-loading-text">Loading...</p>
      </div>
    </div>

    <!-- Empty State -->
    <div id="hla-empty">
      <p>Select a driver and date range, then click Search to view HOS log edits.</p>
    </div>

  </div>

  <!-- Error Banner -->
  <div id="hla-error" class="hla-error" style="display:none;"></div>

</div>

<script src="scripts/main.js?v=1"></script>
</body>
</html>
